<div class="product-page-wrapper">
  <div class="product-details-container">

    <!-- LEVA KOLONA: Galerija -->
    <div class="product-gallery">
      <div class="main-image-box">
        <img [src]="mainImage" alt="Product Image" class="main-img" />

        <button *ngIf="product.slike.length > 1" class="gallery-nav prev" (click)="previousImage()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
        <button *ngIf="product.slike.length > 1" class="gallery-nav next" (click)="nextImage()">
          <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </button>
      </div>

      <div class="thumb-list" *ngIf="product.slike.length > 1">
        <div class="thumb-item" *ngFor="let image of product.slike; let i = index"
          [class.active]="currentImageIndex === i" (click)="changeMainImage(image); currentImageIndex = i">
          <img [src]="image" alt="Thumbnail" />
        </div>
      </div>
    </div>

    <!-- DESNA KOLONA: Info -->
    <div class="product-essential-info">
      <div class="info-header">
        <span class="sku">Šifra artikla: {{ product.sifra }}</span>
        <h1 class="product-name">{{ product.naziv }}</h1>
      </div>

      <!-- PURCHASE CARD -->
      <div class="purchase-card">
        <div class="price-section">
          <div class="price-row">
            <div class="main-price">
              <span class="amount">{{ product.mpcena | number:'1.2-2' }}</span>
              <span class="currency">RSD</span>
            </div>
          </div>
          <p class="price-note">Maloprodajna cena sa PDV-om</p>
        </div>

        <button (click)="addToCart(product)" class="buy-button">
          Dodaj u korpu
        </button>
      </div>

    </div>

  </div>

  <!-- DONJA SEKCIJA: Opis -->
  <div class="product-description-section">
    <div class="section-header">
      <h2 class="section-title">Opis proizvoda</h2>
    </div>
    <div class="description-body">
      <div class="rich-text-content" [innerHTML]="sanitizedDescription"></div>
    </div>
  </div>
</div>
