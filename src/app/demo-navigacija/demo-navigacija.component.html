<nav class="demo-nav">
    <div class="demo-tab-bar">

        <!-- All Categories Trigger -->
        <div class="demo-trigger" (mouseenter)="openPanel()" (mouseleave)="closePanel()">
            <div class="trigger-content">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
                <span>SVE KATEGORIJE</span>
            </div>

            <!-- Floating Panel (SaaS Style) -->
            <div class="demo-floating-panel" *ngIf="showPanel" (mouseenter)="onPanelEnter()"
                (mouseleave)="onPanelLeave()">
                <div class="panel-inner">

                    <!-- Column 1: Main Groups -->
                    <div class="col-main">
                        <h4 class="col-title">Kategorije</h4>
                        <ul class="nav-list">
                            <li *ngFor="let mainGrp of mockData" class="nav-item"
                                [class.active]="activeMain === mainGrp" (mouseenter)="selectMain(mainGrp)">
                                <div class="item-content">
                                    <div class="item-text">{{ mainGrp.name }}</div>
                                    <svg class="chevron" xmlns="http://www.w3.org/2000/svg" width="14" height="14"
                                        viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                        stroke-linecap="round" stroke-linejoin="round">
                                        <polyline points="9 18 15 12 9 6"></polyline>
                                    </svg>
                                </div>
                            </li>
                        </ul>
                    </div>

                    <!-- Column 2: Sub Groups -->
                    <div class="col-sub" *ngIf="activeMain">
                        <h4 class="col-title">{{ activeMain.name }}</h4>
                        <div class="grid-2">
                            <div *ngFor="let subGrp of activeMain.subgroups" class="nav-item sub-item"
                                [class.active]="activeSub === subGrp" (mouseenter)="selectSub(subGrp)">
                                <span class="item-text">{{ subGrp.name }}</span>
                            </div>
                        </div>
                    </div>

                    <!-- Column 3: Leaf Groups -->
                    <div class="col-leaf" *ngIf="activeSub">
                        <h4 class="col-title">{{ activeSub.name }}</h4>
                        <div class="grid-3">
                            <div *ngFor="let leaf of activeSub.items" class="leaf-item">
                                {{ leaf }}
                            </div>
                        </div>
                        <div class="empty-state" *ngIf="activeSub.items.length === 0">
                            Uskoro novi artikli...
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Regular Links -->
        <div class="demo-links">
            <a href="#" class="demo-link">Proizvodi</a>
            <a href="#" class="demo-link">Brendovi</a>
            <a href="#" class="demo-link">Akcije</a>
            <a href="#" class="demo-link">Novo</a>
            <a href="#" class="demo-link">Podrška</a>
        </div>

    </div>
</nav>
